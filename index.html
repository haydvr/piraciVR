<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPFS File Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:#0b0f19;
  color:#e5e7eb;
  font-family:Arial, sans-serif;
  padding:20px;
}
.card {
  background:#111827;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
  border:1px solid #1f2937;
}
button {
  background:#4f46e5;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
button.secondary {
  background:#374151;
}
input[type="file"] {
  margin-top:10px;
}
.search {
  width:100%;
  padding:8px;
  margin-top:10px;
  border-radius:5px;
  border:1px solid #374151;
  background:#0b0f19;
  color:white;
}
.file-list {
  max-height:60vh;
  overflow-y:auto;
  margin-top:10px;
}
.file-item {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #1f2937;
}
.file-meta {
  font-size:12px;
  color:#9ca3af;
}
</style>
</head>

<body>

<h1>IPFS File Vault</h1>

<div class="card">
  <h3>Upload File</h3>
  <input type="file" id="fileInput">
  <br><br>
  <button id="uploadBtn">Upload</button>
  <div id="uploadStatus"></div>
</div>

<div class="card">
  <h3>Uploaded Files</h3>
  <input class="search" id="searchInput" placeholder="Search files...">
  <div class="file-list" id="fileList"></div>
</div>

<script>
// Local list of uploaded files
let files = [];

// Upload to IPFS via nft.storage public endpoint
async function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const status = document.getElementById("uploadStatus");

  if (!fileInput.files.length) {
    status.textContent = "No file selected.";
    return;
  }

  const file = fileInput.files[0];
  status.textContent = "Uploading to IPFS...";

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("https://api.nft.storage/upload", {
    method: "POST",
    body: formData
  });

  const json = await res.json();

  if (!json.ok) {
    status.textContent = "Upload failed.";
    return;
  }

  const cid = json.value.cid;
  const url = `https://ipfs.io/ipfs/${cid}`;

  files.push({
    name: file.name,
    cid: cid,
    url: url,
    size: file.size
  });

  status.textContent = "Uploaded!";
  fileInput.value = "";
  renderFiles();
}

function renderFiles() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const fileList = document.getElementById("fileList");

  fileList.innerHTML = "";

  const filtered = files.filter(f => f.name.toLowerCase().includes(search));

  filtered.forEach(file => {
    const row = document.createElement("div");
    row.className = "file-item";

    const left = document.createElement("div");
    left.innerHTML = `
      <strong>${file.name}</strong><br>
      <span class="file-meta">${(file.size/1024).toFixed(1)} KB</span>
    `;

    const btn = document.createElement("button");
    btn.className = "secondary";
    btn.textContent = "Open";
    btn.onclick = () => window.open(file.url, "_blank");

    row.appendChild(left);
    row.appendChild(btn);
    fileList.appendChild(row);
  });
}

document.getElementById("uploadBtn").onclick = uploadFile;
document.getElementById("searchInput").oninput = renderFiles;
</script>

</body>
</html>
