<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Catbox File Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:#0b0f19;
  color:#e5e7eb;
  font-family:Arial, sans-serif;
  padding:20px;
}
.card {
  background:#111827;
  padding:20px;
  border-radius:10px;
  margin-bottom:25px;
  border:2px solid #1f2937;
}
button {
  background:#4f46e5;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}
button.secondary {
  background:#374151;
}
input[type="file"] {
  margin-top:10px;
  font-size:16px;
}
.search {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #374151;
  background:#0b0f19;
  color:white;
  font-size:16px;
}
.file-list {
  max-height:60vh;
  overflow-y:auto;
  margin-top:10px;
}
.file-item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #1f2937;
}
.file-meta {
  font-size:12px;
  color:#9ca3af;
}
</style>
</head>

<body>

<h1>Catbox File Vault</h1>

<div class="card" style="border-color:#4f46e5;">
  <h2 style="margin-top:0;">Upload File</h2>

  <input type="file" id="fileInput">
  <br><br>

  <button id="uploadBtn">🚀 Upload to Catbox</button>

  <div id="uploadStatus" style="margin-top:10px; font-size:14px;"></div>
</div>

<div class="card">
  <h2 style="margin-top:0;">Files</h2>

  <input class="search" id="searchInput" placeholder="Search files...">

  <div class="file-list" id="fileList"></div>
</div>

<script>
// ====== CONFIG – EDIT THESE TWO ======
const GITHUB_USER = "haydvr";
const GITHUB_REPO = GITHUB_USER + ".github.io";
const GITHUB_TOKEN = "YOUR_GITHUB_TOKEN_HERE"; // keep private
const FILES_PATH = "files.json";
// =====================================

let currentFiles = [];
let currentSha = null;

// Load files.json via GitHub API (to get content + sha)
async function loadFiles() {
  const res = await fetch(
    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILES_PATH}`
  );
  if (!res.ok) {
    console.error("Failed to load files.json");
    return [];
  }
  const json = await res.json();
  currentSha = json.sha;
  const content = atob(json.content.replace(/\n/g, ""));
  try {
    currentFiles = JSON.parse(content);
  } catch (e) {
    currentFiles = [];
  }
  return currentFiles;
}

// Save files.json via GitHub API
async function saveFiles(files) {
  const newContent = btoa(JSON.stringify(files, null, 2));

  const res = await fetch(
    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILES_PATH}`,
    {
      method: "PUT",
      headers: {
        "Authorization": `Bearer ${GITHUB_TOKEN}`,
        "Accept": "application/vnd.github+json"
      },
      body: JSON.stringify({
        message: "Update files.json",
        content: newContent,
        sha: currentSha
      })
    }
  );

  if (!res.ok) {
    console.error("Failed to save files.json");
    alert("Error saving file list to GitHub.");
    return;
  }

  const json = await res.json();
  currentSha = json.content.sha;
}

// Upload to Catbox
async function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const status = document.getElementById("uploadStatus");

  if (!fileInput.files.length) {
    status.textContent = "No file selected.";
    return;
  }

  const file = fileInput.files[0];
  status.textContent = "Uploading to Catbox...";

  const formData = new FormData();
  formData.append("reqtype", "fileupload");
  formData.append("fileToUpload", file);

  try {
    const res = await fetch("https://catbox.moe/user/api.php", {
      method: "POST",
      body: formData
    });

    const url = (await res.text()).trim();

    if (!url.startsWith("http")) {
      status.textContent = "Upload failed: " + url;
      return;
    }

    status.textContent = "Uploaded!";

    currentFiles.push({
      name: file.name,
      url: url,
      size: file.size,
      uploaded: Date.now()
    });

    await saveFiles(currentFiles);

    fileInput.value = "";
    renderFiles();

  } catch (err) {
    console.error(err);
    status.textContent = "Upload error.";
  }
}

// Render file list
function renderFiles() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const fileList = document.getElementById("fileList");

  fileList.innerHTML = "";

  const filtered = currentFiles.filter(f =>
    f.name.toLowerCase().includes(search)
  );

  filtered
    .slice()
    .sort((a, b) => b.uploaded - a.uploaded)
    .forEach(file => {
      const row = document.createElement("div");
      row.className = "file-item";

      const left = document.createElement("div");
      left.innerHTML = `
        <strong>${file.name}</strong><br>
        <span class="file-meta">
          ${(file.size/1024).toFixed(1)} KB •
          ${new Date(file.uploaded).toLocaleString()}
        </span>
      `;

      const btn = document.createElement("button");
      btn.className = "secondary";
      btn.textContent = "Open";
      btn.onclick = () => window.open(file.url, "_blank");

      row.appendChild(left);
      row.appendChild(btn);
      fileList.appendChild(row);
    });
}

// Init
loadFiles().then(() => {
  renderFiles();
  document.getElementById("searchInput").oninput = renderFiles;
});

document.getElementById("uploadBtn").onclick = uploadFile;
</script>

</body>
</html>
